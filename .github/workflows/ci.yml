name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache-dependency-path: backend/go.sum
      - run: /usr/local/go/bin/go test ./...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Verify public OpenAPI copy
        working-directory: .
        run: cmp docs/openapi.yaml web/public/openapi.yaml
      - run: npm ci
      - run: npm test -- --run
      - run: npm run build
